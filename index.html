<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieSafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- GRAIN -->
  <div class="grain"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">MOVIE<span>SAFE</span></div>
    <div class="header-right">
      <span class="video-counter" id="videoCounter">— videos</span>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>YOUR PRIVATE<br/><em>SCREENING ROOM</em></h1>
    <p>Stream your personal video library — anywhere, anytime.</p>
  </section>

  <!-- SEARCH + FILTER -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search videos..." oninput="filterVideos()"/>
    </div>
    <div class="sort-wrap">
      <select id="sortSelect" onchange="filterVideos()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="az">A → Z</option>
        <option value="duration">Longest first</option>
      </select>
    </div>
  </div>

  <!-- GRID -->
  <main>
    <div class="video-grid" id="videoGrid"></div>

    <!-- LOADING SKELETONS -->
    <div class="skeleton-grid" id="loadingState">
      ${[...Array(6)].map(() => `
      <div class="skeleton-card">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line xshort"></div>
        </div>
      </div>`).join('')}
    </div>

    <!-- EMPTY -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">◻</div>
      <h3>No videos found</h3>
      <p>Try a different search term.</p>
    </div>

    <!-- ERROR -->
    <div class="error-state" id="errorState" style="display:none;">
      <div class="error-icon">⚠</div>
      <h3>Could not load videos</h3>
      <p id="errorMsg">Check your connection and try again.</p>
      <button onclick="loadVideos()">Retry</button>
    </div>
  </main>

  <!-- PLAYER MODAL -->
  <div class="modal" id="playerModal" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <button class="modal-close" onclick="closePlayer()">✕</button>
      <div class="modal-video-wrap">
        <video id="videoPlayer" controls playsinline></video>
      </div>
      <div class="modal-info">
        <h2 id="playerTitle"></h2>
        <div class="modal-meta">
          <span id="playerDuration"></span>
          <span id="playerFormat"></span>
          <span id="playerDate"></span>
        </div>
        <div class="modal-tags" id="playerTags"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
