<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSafe - Video Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-hover: #252535;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3rem; padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap; gap: 1rem;
        }
        .logo {
            display: flex; align-items: center; gap: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent-gradient); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            -webkit-text-fill-color: white; color: white; font-size: 1.25rem;
        }
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 1.5rem;
            display: flex; align-items: center; gap: 1rem;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--accent-primary); }
        .stat-icon {
            width: 48px; height: 48px;
            background: rgba(99, 102, 241, 0.1); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .stat-info h3 { font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; margin-bottom: 0.25rem; }
        .stat-info p { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
        }
        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input {
            width: 100%; padding: 0.875rem 1rem 0.875rem 3rem;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; color: var(--text-primary); font-size: 0.95rem;
            transition: all 0.3s ease; outline: none;
        }
        .search-box input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box::before {
            content: '🔍'; position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); opacity: 0.5;
        }
        .filter-tabs {
            display: flex; gap: 0.5rem;
            background: var(--bg-card); padding: 0.5rem;
            border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto;
        }
        .filter-tab {
            padding: 0.5rem 1rem; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; border-radius: 8px;
            font-weight: 500; transition: all 0.3s ease; white-space: nowrap;
        }
        .filter-tab.active { background: var(--accent-gradient); color: white; }
        .filter-tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-hover); }
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; margin-bottom: 3rem;
        }
        .video-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 20px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .video-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg), var(--shadow-glow); border-color: var(--accent-primary); }
        .video-thumbnail { position: relative; width: 100%; aspect-ratio: 16/9; background: var(--bg-secondary); overflow: hidden; }
        .video-thumbnail img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: block; }
        .video-card:hover .video-thumbnail img { transform: scale(1.05); }
        .video-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .video-card:hover .video-overlay { opacity: 1; }
        .play-button {
            width: 64px; height: 64px;
            background: rgba(255, 255, 255, 0.95); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: var(--bg-primary);
            transform: scale(0.8); transition: transform 0.3s ease; padding-left: 4px;
        }
        .video-card:hover .play-button { transform: scale(1); }
        .video-info { padding: 1.25rem; }
        .video-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem;
            color: var(--text-primary); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .video-meta {
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-secondary); font-size: 0.875rem;
        }
        .video-tags { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .tag {
            padding: 0.25rem 0.75rem;
            background: rgba(99, 102, 241, 0.1); color: var(--accent-primary);
            border-radius: 20px; font-size: 0.75rem; font-weight: 500;
        }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state h3 { font-size: 1.5rem; color: var(--text-primary); margin-bottom: 0.5rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 24px; width: 100%; max-width: 1000px; overflow: hidden; animation: modalSlide 0.3s ease; }
        @keyframes modalSlide { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .modal-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: white; }
        .close-btn { width: 36px; height: 36px; border-radius: 10px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; transition: all 0.2s ease; }
        .close-btn:hover { background: #ef4444; border-color: #ef4444; }
        .video-player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-player-container iframe { width: 100%; height: 100%; border: none; display: block; }
        .player-info { padding: 1.5rem; background: var(--bg-secondary); }
        .player-info p { color: var(--text-secondary); font-size: 0.9rem; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 5px; border: 2px solid var(--bg-primary); }
        ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .video-grid { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">▶</div>
                <span>MovieSafe</span>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">🎬</div>
                <div class="stat-info"><h3>Total Videos</h3><p id="totalVideos">0</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">☁️</div>
                <div class="stat-info"><h3>Storage</h3><p>Google Drive</p></div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search videos by title or tag..." oninput="filterVideos()">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all', event)">All</button>
                <button class="filter-tab" onclick="setFilter('movie', event)">Movies</button>
                <button class="filter-tab" onclick="setFilter('tv', event)">TV Shows</button>
                <button class="filter-tab" onclick="setFilter('personal', event)">Personal</button>
                <button class="filter-tab" onclick="setFilter('other', event)">Other</button>
            </div>
        </div>

        <div id="videoGrid" class="video-grid"></div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-state-icon">☁️</div>
            <h3>No videos found</h3>
            <p>Try a different search or filter.</p>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="playerTitle"></h2>
                <button class="close-btn" onclick="closePlayer()">×</button>
            </div>
            <div class="video-player-container">
                <iframe id="videoPlayer" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="player-info">
                <p id="playerMeta"></p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // TO ADD A VIDEO:
        // 1. Upload to Google Drive
        // 2. Right click > Share > Anyone with the link
        // 3. Copy the file ID from the URL
        //    (the part between /d/ and /view)
        // 4. Add an entry to the VIDEOS list below
        // ============================================
        const VIDEOS = [
            {
                id: '1O6uYZ6APwpLHhoxyERxK8VPvlG5DXMAh',
                title: 'My First Video',
                category: 'personal',
                tags: ['personal'],
                date: '2024-01-01',
            },
            // {
            //     id: 'YOUR_GOOGLE_DRIVE_FILE_ID',
            //     title: 'Video Title',
            //     category: 'movie', // movie, tv, personal, other
            //     tags: ['action', 'drama'],
            //     date: '2024-01-01',
            // },
        ];
        // ============================================

        let currentFilter = 'all';

        function init() {
            document.getElementById('totalVideos').textContent = VIDEOS.length;
            renderVideos();
        }

        function renderVideos() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('videoGrid');
            const empty = document.getElementById('emptyState');

            let filtered = VIDEOS.filter(v => {
                const matchFilter = currentFilter === 'all' || v.category === currentFilter;
                const matchSearch = v.title.toLowerCase().includes(q) ||
                    (v.tags || []).some(t => t.toLowerCase().includes(q));
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.style.display = 'grid';
            grid.innerHTML = filtered.map((v, i) => `
                <div class="video-card" onclick="playVideo('${v.id}', '${v.title}', '${v.category}', '${v.date}')" style="animation-delay:${Math.min(i*0.05,0.4)}s">
                    <div class="video-thumbnail">
                        <img src="https://drive.google.com/thumbnail?id=${v.id}&sz=w640" alt="${v.title}" loading="lazy" onerror="this.src='https://placehold.co/640x360/1a1a25/6366f1?text=Video'"/>
                        <div class="video-overlay"><div class="play-button">▶</div></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <div class="video-meta">
                            <span>${v.category.charAt(0).toUpperCase() + v.category.slice(1)}</span>
                            <span>${formatDate(v.date)}</span>
                        </div>
                        ${v.tags && v.tags.length ? `<div class="video-tags">${v.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterVideos() { renderVideos(); }

        function setFilter(filter, event) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            renderVideos();
        }

        function playVideo(id, title, category, date) {
            document.getElementById('videoPlayer').src = `https://drive.google.com/file/d/${id}/preview`;
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerMeta').textContent =
                category.charAt(0).toUpperCase() + category.slice(1) + ' • ' + formatDate(date);
            document.getElementById('playerModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('playerModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        window.onclick = e => { if (e.target.id === 'playerModal') closePlayer(); };
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

        function formatDate(str) {
            if (!str) return '';
            return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        init();
    </script>
</body>
</html>
